<style>
  :root {

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  .app { max-width: 430px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

  /* Header */
  .hdr { background: var(--card); padding: env(safe-area-inset-top, 0) 16px 0; border-bottom: 0.5px solid var(--border); position: sticky; top: 0; z-index: 100; }

  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: #1D9E75; }

  /* Tabs */

  /* Day cards */

  .day-actions { display: flex; gap: 2px; flex-shrink: 0; }

  /* Events */
  .day-body { border-top: 0.5px solid var(--border); padding: 8px 10px 6px; }
  .ev-wrap { border-radius: var(--radius-sm); margin-bottom: 2px; border: 1px solid transparent; transition: all 0.15s; }

  .ev:active { background: var(--bg); }
  .ev:hover .ev-acts, .ev:focus-within .ev-acts { opacity: 1; }
  .drag-handle { width: 16px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; cursor: grab; color: var(--text3); font-size: 14px; padding-top: 3px; touch-action: none; }
  .ev-time { font-size: 11px; color: var(--text3); width: 36px; flex-shrink: 0; padding-top: 3px; line-height: 1.3; }

  .map-btn { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: #fff; padding: 4px 10px; border-radius: 20px; background: var(--gmap); border: none; cursor: pointer; margin-top: 5px; text-decoration: none; font-weight: 600; }
  .flex-seg { border-radius: var(--radius-sm); padding: 8px 10px; margin: 3px 0 5px; border-left: 3px solid; }

  .r-check.done { background: currentColor; }

  .pack-card { background: var(--card); border-radius: var(--radius); border: 0.5px solid var(--border); margin-bottom: 8px; overflow: hidden; }
  .pack-hdr { display: flex; align-items: center; padding: 11px 13px; cursor: pointer; gap: 8px; }

  .pack-check { width: 20px; height: 20px; border-radius: 5px; border: 1.5px solid var(--border2); cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .pack-check.on { background: #1D9E75; border-color: #1D9E75; }
  .pack-label { flex: 1; font-size: 13px; color: var(--text); }
  .pack-label.done { color: var(--text3); text-decoration: line-through; }
  .who-badge { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 600; }
  .who-a { background: var(--blue-bg); color: var(--blue); }
  .who-b { background: var(--purple-bg); color: var(--purple); }
  .pack-del { width: 24px; height: 24px; border: none; background: transparent; cursor: pointer; color: var(--text3); display: flex; align-items: center; justify-content: center; border-radius: 5px; opacity: 0.4; transition: opacity 0.15s, color 0.15s; }
  .pack-del:hover { color: var(--red); background: var(--red-bg); }

  /* Accom cards */
  .accard { background: var(--card); border-radius: var(--radius); border: 0.5px solid var(--border); margin-bottom: 8px; padding: 13px; }
  .status-ok { background: var(--green-bg); color: var(--green); font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
  .status-warn { background: var(--amber-bg); color: var(--amber); font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: flex-end; justify-content: center; z-index: 200; pointer-events: none; }
  .modal-overlay.open { display: flex; pointer-events: auto; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--card); border-radius: var(--radius) var(--radius) 0 0; padding: 20px 20px calc(env(safe-area-inset-bottom, 0) + 20px); width: 100%; max-width: 430px; max-height: 90vh; overflow-y: auto; }
  .modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: -8px auto 16px; }
  .modal h3 { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 14px; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 5px; margin-top: 12px; display: block; }
  input[type=text], select, textarea { width: 100%; padding: 10px 12px; font-size: 14px; border: 1px solid var(--border2); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); font-family: inherit; -webkit-appearance: none; }
  input[type=text]:focus, select:focus, textarea:focus { outline: none; border-color: var(--blue); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 18px; }
  .btn-primary { flex: 1; padding: 12px; background: var(--blue); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 14px; cursor: pointer; font-weight: 600; font-family: inherit; }
  .btn-ghost { padding: 12px 16px; background: transparent; color: var(--text2); border: 1px solid var(--border2); border-radius: var(--radius-sm); font-size: 14px; cursor: pointer; font-family: inherit; }
  .btn-danger { padding: 12px 14px; background: transparent; color: var(--red); border: 1px solid #F09595; border-radius: var(--radius-sm); font-size: 14px; cursor: pointer; font-family: inherit; }
  .type-btns { display: flex; gap: 6px; margin-top: 5px; }
  .type-btn { flex: 1; padding: 9px; font-size: 12px; font-weight: 600; border: 1px solid var(--border2); border-radius: var(--radius-sm); cursor: pointer; background: var(--bg); color: var(--text2); font-family: inherit; }
  .type-btn.on { background: var(--blue-bg); color: var(--blue); border-color: #B5D4F4; }

  .badge-opt.on { outline: 2px solid var(--text); }
  .search-row { display: flex; gap: 8px; margin-top: 5px; }
  .search-results { border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; margin-top: 6px; display: none; }
  .search-result { display: flex; align-items: center; gap: 10px; padding: 10px 12px; cursor: pointer; border-bottom: 0.5px solid var(--border); }
  .search-result:last-child { border-bottom: none; }
  .search-result:active { background: var(--bg); }
  .sel-place { display: none; margin-top: 6px; padding: 8px 11px; background: var(--blue-bg); border-radius: var(--radius-sm); font-size: 12px; color: var(--blue); font-weight: 500; }

  /* Sync screen */
  .full-screen { position: fixed; inset: 0; background: var(--card); display: none; flex-direction: column; align-items: center; justify-content: center; padding: 32px; z-index: 300; pointer-events: none; }
  .full-screen.open { display: flex; pointer-events: auto; }
  .full-screen.open { display: flex; }
  .code-box { font-size: 32px; font-weight: 700; letter-spacing: 10px; color: var(--text); background: var(--bg); padding: 18px 28px; border-radius: var(--radius); margin: 18px 0; font-family: 'Courier New', monospace; }
  .sync-status { font-size: 13px; color: var(--text3); margin-top: 8px; }


  .note-cat-btn { padding: 5px 13px; font-size: 12px; font-weight: 600; border-radius: 20px; border: 1px solid var(--border2); background: var(--bg); color: var(--text2); cursor: pointer; white-space: nowrap; font-family: inherit; }
  .note-cat-btn.on { background: var(--text); color: var(--card); border-color: var(--text); }

  .fab { position: fixed; bottom: calc(env(safe-area-inset-bottom, 0) + 20px); right: 20px; width: 52px; height: 52px; background: var(--blue); color: #fff; border: none; border-radius: 50%; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(24,95,165,0.4); z-index: 90; transition: transform 0.2s; }
  .fab:active { transform: scale(0.92); }
  .fab-menu { position: fixed; bottom: calc(env(safe-area-inset-bottom, 0) + 82px); right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 90; align-items: flex-end; }

  .fab-item { display: flex; align-items: center; gap: 10px; cursor: pointer; }

  .fab-backdrop.show { display: block; }

  /* Context Menu */
  .ctx-menu { position: fixed; background: var(--card); border-radius: var(--radius); box-shadow: 0 8px 32px rgba(0,0,0,0.18); border: 0.5px solid var(--border); z-index: 500; min-width: 180px; overflow: hidden; }
  .ctx-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px; font-size: 15px; color: var(--text); cursor: pointer; border-bottom: 0.5px solid var(--border); font-weight: 500; }

  @keyframes spin { to { transform: rotate(360deg); } }

<div class="app">
  <!-- Header -->
  <div class="hdr">
    <div class="hdr-inner">
      <div class="hdr-top">
        <span class="hdr-title" id="app-title">🎵 旅遊規劃</span>

<script>
// PWA Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    // Inline service worker via blob
    const swCode = `
const CACHE = 'travel-v1';
const ASSETS = [self.location.pathname.replace('sw.js',''), 'https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css'];
self.addEventListener('install', e => e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS).catch(()=>{}))));
self.addEventListener('fetch', e => {
  if (e.request.url.includes('firebase') || e.request.url.includes('anthropic')) return;
  e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).then(res => { if(res.ok && e.request.method==='GET'){const c=res.clone();caches.open(CACHE).then(cache=>cache.put(e.request,c));} return res; }).catch(()=>caches.match('/'))));
});
self.addEventListener('push', e => {
  const d = e.data ? e.data.json() : {};
  e.waitUntil(self.registration.showNotification(d.title||'旅遊提醒', { body: d.body||'', icon: '/icon.png', badge: '/icon.png' }));
});`;
    const blob = new Blob([swCode], {type: 'application/javascript'});
    const url = URL.createObjectURL(blob);
    navigator.serviceWorker.register(url).then(reg => {
      console.log('SW registered');
      // Check reminders daily
      checkReminders(reg);
    }).catch(e => console.log('SW failed', e));
  });
}

function checkReminders(reg) {
  // Simple client-side reminder check
  if (!G || !G.reminders) return;
  var today = new Date();
  G.reminders.forEach(r => {
    if (r.done) return;
    // parse date like "5月 21 日"
    var m = r.date.match(/(\d+)月\s*(\d+)/);
    if (!m) return;
    var rDate = new Date(today.getFullYear(), parseInt(m[1])-1, parseInt(m[2]));
    var diff = Math.floor((rDate - today) / 86400000);
    if (diff === 0) {
      toast('📅 今天要做：' + r.title);
    } else if (diff === 1) {
      toast('⏰ 明天提醒：' + r.title);
    }
  });
}

// ─── Firebase ────────────────────────────────────────────
var FIREBASE_KEY = 'data';
var firebaseSaveTimer = null;

function getFirebaseEndpoint() {
  var code = G.roomCode || 'default';
  return FIREBASE_URL.replace(/\/$/, '') + '/trips/' + code + '/' + FIREBASE_KEY + '.json';
}

async function firebaseSave() {
  if (!FIREBASE_URL || FIREBASE_URL === 'YOUR_FIREBASE_URL') return;
  try {
    var payload = { days: G.days, reminders: G.reminders, accom: G.accom, luggage: G.luggage, packs: G.packs, notes: G.notes || [] };
    await fetch(getFirebaseEndpoint(), { method: 'PUT', body: JSON.stringify(payload) });
  } catch (e) { console.warn('Firebase save failed', e); }
}

async function firebaseLoad(code) {
  if (!FIREBASE_URL || FIREBASE_URL === 'YOUR_FIREBASE_URL') return false;
  try {
    var res = await fetch(FIREBASE_URL.replace(/\/$/, '') + '/trips/' + code + '/' + FIREBASE_KEY + '.json');
    var data = await res.json();
    if (data) {
      G.days = data.days || [];
      G.reminders = data.reminders || [];
      G.accom = data.accom || [];
      G.luggage = data.luggage || [];
      G.packs = data.packs || {};
      G.notes = data.notes || [];
      return true;
    }
  } catch (e) { console.warn('Firebase load failed', e); }
  return false;
}

function scheduleSave() {
  clearTimeout(firebaseSaveTimer);
  firebaseSaveTimer = setTimeout(firebaseSave, 800);
  // Also save to localStorage as backup
  try { localStorage.setItem('travel_' + G.roomCode, JSON.stringify({ days: G.days, reminders: G.reminders, accom: G.accom, luggage: G.luggage, packs: G.packs, notes: G.notes || [] })); } catch(e) {}
}

function loadFromLocal(code) {
  try {
    var raw = localStorage.getItem('travel_' + code);
    if (raw) { var d = JSON.parse(raw); Object.assign(G, d); return true; }
  } catch(e) {}
  return false;
}

// ─── Room / Sync ─────────────────────────────────────────
function generateCode() { return Math.random().toString(36).substring(2, 6).toUpperCase(); }

async function initRoom() {
  // Always start with INIT_DATA as baseline
  Object.assign(G, JSON.parse(JSON.stringify(INIT_DATA)));

  // Try to get saved room code
  var saved = localStorage.getItem('travel_room_code');
  G.roomCode = saved || generateCode();
  if (!saved) localStorage.setItem('travel_room_code', G.roomCode);

  // Try to overlay with local storage data (may have user edits)
  var hasLocal = loadFromLocal(G.roomCode);

  // Show immediately — never block on network
  updateRoomDisplay();
  renderAll();

  // Firebase sync in background (only if configured)
  if (FIREBASE_URL !== 'YOUR_FIREBASE_URL') {
    try {
      var loaded = await firebaseLoad(G.roomCode);
      if (loaded) { renderAll(); scheduleSave(); }
    } catch(e) {}
  } else if (!hasLocal) {
    // No Firebase, no local — save INIT_DATA to local so it persists
    scheduleSave();
  }
}

function updateRoomDisplay() {
  document.getElementById('room-code-display').textContent = G.roomCode;
  document.getElementById('sync-code-display').textContent = G.roomCode;
  var dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot' + (FIREBASE_URL !== 'YOUR_FIREBASE_URL' ? '' : ' offline');
  document.getElementById('sync-status-text').textContent = FIREBASE_URL !== 'YOUR_FIREBASE_URL' ? '已連線 Firebase — 即時同步' : '⚠️ 尚未設定 Firebase（僅本機儲存）';
}

async function joinRoom() {
  var code = document.getElementById('join-input').value.trim().toUpperCase();
  if (!code) { toast('請輸入房間碼'); return; }
  G.roomCode = code;
  localStorage.setItem('travel_room_code', code);
  // Try local first
  var hasLocal = loadFromLocal(code);
  if (!hasLocal) {
    // Show loading toast
    toast('載入旅程中…');
  }
  updateRoomDisplay();
  renderAll();
  closeSync();
  // Firebase in background
  if (FIREBASE_URL !== 'YOUR_FIREBASE_URL') {
    try {
      var loaded = await firebaseLoad(code);
      if (loaded) { renderAll(); toast('已加入旅程 ' + code); }
      else { toast('找不到旅程 ' + code + '，請確認房間碼'); }

function calcWarn(dep, mins) {
  if (!dep || !mins) return '';
  var p = dep.split(':');
  if (p.length < 2) return '';
  var h = parseInt(p[0]), m = parseInt(p[1]) - parseInt(mins);
  while (m < 0) { m += 60; h--; }
  if (h < 0) h += 24;
  return h + ':' + (m < 10 ? '0' : '') + m;
}

function renderDays() {
  var el = document.getElementById('days-list');
  if (!G.days || !G.days.length) {
    el.innerHTML = '<div style="text-align:center;padding:28px;font-size:14px;color:var(--text3)">尚無行程，點下方按鈕新增</div>';
    return;
  }
  el.innerHTML = G.days.map((d, i) => {
    var c = DAY_COLORS[i % DAY_COLORS.length];
    var badges = (d.badges || []).map(b => `<span class="badge ${BADGE_CLASS[b] || 'b-blue'}">${b}</span>`).join('');
    var events = (d.events || []).map((ev, ei) => {
      var last = ei === d.events.length - 1;
      var conn = last ? '' : `<div class="ev-conn" style="background:${c[1]}"></div>`;
      var acts = `<div class="ev-acts"><button class="icon-btn" onclick="openAddEvent(${i},${ei},event)" aria-label="編輯"><i class="ti ti-edit"></i></button><button class="icon-btn red" onclick="quickDelEv(${i},${ei},event)" aria-label="刪除"><i class="ti ti-trash"></i></button></div>`;
      var drag = `draggable="true" data-day="${i}" data-ev="${ei}" ondragstart="ds(event)" ondragover="do_(event)" ondrop="dd(event)" ondragleave="dl(event)"`;

      if (ev.type === 'flex') {
        var sc = ev.segColor || { c: '#9FE1CB', t: '#085041', b: '#5DCAA5' };
        var tags = (ev.flexItems || []).map(it => `<span class="flex-tag" style="background:${sc.b}33;color:${sc.t}">${it}</span>`).join('');
        return `<div class="ev-wrap" ${drag}><div class="ev"><div class="drag-handle"><i class="ti ti-grip-vertical"></i></div><div class="ev-time">${ev.time || ''}</div><div class="ev-line"><div class="ev-dot" style="background:${sc.b}"></div>${conn}</div><div class="ev-body"><div class="flex-seg" style="background:${sc.c}33;border-left-color:${sc.b}"><div class="flex-label" style="color:${sc.t}"><i class="ti ti-sparkles" style="font-size:11px"></i> ${ev.flexTitle}</div><div class="flex-tags">${tags}</div><div style="font-size:11px;color:${sc.t};margin-top:5px;opacity:.7">${ev.flexTime}</div></div></div>${acts}</div></div>`;
      }
      if (ev.type === 'train') {
        var wt = ev.warnMin && ev.depart ? calcWarn(ev.depart, ev.warnMin) : '';
        var warn = wt ? `<div class="warn-chip"><i class="ti ti-alarm" style="font-size:11px"></i> 最晚 ${wt} 到站（${ev.warnMin} 分前）</div>` : '';

}

// Drag & drop
var dsDay = null, dsEv = null;
function ds(e) { var w = e.currentTarget; dsDay = +w.dataset.day; dsEv = +w.dataset.ev; w.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; }
function do_(e) { e.preventDefault(); var w = e.currentTarget; if (+w.dataset.day === dsDay) w.classList.add('drag-over'); }
function dl(e) { e.currentTarget.classList.remove('drag-over'); }
function dd(e) {
  e.preventDefault(); var w = e.currentTarget; w.classList.remove('drag-over');
  var tD = +w.dataset.day, tE = +w.dataset.ev;
  if (dsDay === null || dsDay !== tD || dsEv === tE) return;
  var evs = G.days[dsDay].events, moved = evs.splice(dsEv, 1)[0];
  evs.splice(tE > dsEv ? tE - 1 : tE, 0, moved);
  scheduleSave(); renderDays();
  setTimeout(() => { toggleDay(dsDay); document.getElementById('chev-' + dsDay)?.classList.add('open'); }, 50);
  dsDay = null; dsEv = null;
}

// ─── Place Search ────────────────────────────────────────
// ─── Place Search (OSM + Google Maps fallback) ───────────
var osmTimer = null;
async function searchPlace(ctx) {
  var inp = document.getElementById(ctx + '-place-q');
  var resEl = document.getElementById(ctx + '-place-results');
  var q = inp ? inp.value.trim() : '';
  if (!q || q.length < 1) { resEl.style.display = 'none'; return; }
  
  resEl.style.display = 'block';
  resEl.innerHTML = '<div style="padding:12px 14px;font-size:13px;color:var(--text3);display:flex;align-items:center;gap:8px"><div class=\'spinner\'></div> 搜尋中…</div>';
  clearTimeout(osmTimer);
  
  osmTimer = setTimeout(async () => {
    var results = [];
    
    // Try OSM Nominatim - works better with Japanese
    try {
      var osmUrl = 'https://nominatim.openstreetmap.org/search?format=json&limit=5&accept-language=zh-TW,ja&addressdetails=1&q=' + encodeURIComponent(q + ' 日本');
      var res = await fetch(osmUrl, { headers: { 'User-Agent': 'TravelApp/1.0' } });
      var data = await res.json();
      
      // Also try without 日本 suffix
      if (data.length < 2) {
        var res2 = await fetch('https://nominatim.openstreetmap.org/search?format=json&limit=5&accept-language=zh-TW,ja&countrycodes=jp&q=' + encodeURIComponent(q), { headers: { 'User-Agent': 'TravelApp/1.0' } });
        var data2 = await res2.json();
        data = [...data, ...data2].filter((v,i,a) => a.findIndex(t=>t.place_id===v.place_id)===i);
      }
      
      results = data.slice(0, 5).map(function(item) {
        var parts = item.display_name.split(', ');
        var name = parts[0];
        var addr = parts.slice(1, 3).join(', ');
        var navUrl = 'https://www.google.com/maps/dir/?api=1&destination=' + item.lat + ',' + item.lon + '&travelmode=transit';
        return { name, addr, url: navUrl, icon: getPlaceIcon(item) };
      });
    } catch(e) { console.log('OSM error', e); }
    
    // Always add Google Maps search as last option
    var gmapFallback = {
      name: '在 Google Maps 搜尋「' + q + '」',
      addr: '點擊後在 Google Maps 選擇地點，再複製連結貼回',
      url: 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(q),
      icon: 'ti-brand-google-maps',
      isGmap: true
    };
    results.push(gmapFallback);
    
    resEl.innerHTML = results.map(function(r) {
      var safeCtx = ctx;
      var safeName = (r.name||'').replace(/'/g,'\\'').replace(/"/g,'&quot;');
      var safeAddr = (r.addr||'').replace(/'/g,'\\'').replace(/"/g,'&quot;');
      var safeUrl = (r.url||'').replace(/'/g,'%27');
      var iconStyle = r.isGmap ? 'font-size:15px;color:var(--gmap)' : 'font-size:14px;color:var(--text2)';
      var iconName = r.icon || 'ti-map-pin';
      var bg = r.isGmap ? 'var(--blue-bg)' : 'var(--bg)';
      return '<div class="search-result" style="' + (r.isGmap ? 'border-top:1px solid var(--border)' : '') + '" onclick="selectPlace(\'' + safeCtx + '\',\'' + safeName + '\',\'' + safeAddr + '\',\'' + safeUrl + '\')">' +
        '<div style="width:30px;height:30px;background:' + bg + ';border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0">' +
        '<i class="ti ' + iconName + '" style="' + iconStyle + '"></i></div>' +
        '<div style="min-width:0;overflow:hidden">' +
        '<div style="font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + (r.name||'') + '</div>' +
        (r.addr ? '<div style="font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + r.addr + '</div>' : '') +
        '</div></div>';
    }).join('');
    resEl.style.display = 'block';
  }, 600);
}

function getPlaceIcon(item) {
  var t = item.type || '', c = item.class || '';
  if (t === 'station' || t === 'halt' || t === 'subway_entrance' || c === 'railway') return 'ti-train';
  if (c === 'tourism' || c === 'historic') return 'ti-camera';
  if (t === 'restaurant' || t === 'cafe' || t === 'fast_food') return 'ti-tools-kitchen-2';
  if (t === 'hotel' || t === 'hostel' || t === 'motel') return 'ti-building';
  if (t === 'airport') return 'ti-plane';
  if (c === 'shop') return 'ti-shopping-bag';
  return 'ti-map-pin';
}

// Auto-search on typing - bind on modal open instead of DOMContentLoaded
function bindPlaceSearch(ctx) {
  var el = document.getElementById(ctx + '-place-q');
  if (el && !el._searchBound) {
    el._searchBound = true;
    el.addEventListener('input', function() { searchPlace(ctx); });
    el.addEventListener('keydown', function(e) { if(e.key==='Enter') { e.preventDefault(); searchPlace(ctx); } });
  }
}
// Bind all on first use
document.addEventListener('DOMContentLoaded', function() {
  ['ev','ac','lg','n'].forEach(bindPlaceSearch);
});

function selectPlace(ctx, name, addr, url) {
  G.selPlace[ctx] = { name, url };
  document.getElementById(ctx + '-place-results').style.display = 'none';
  var sel = document.getElementById(ctx + '-place-sel');
  sel.textContent = '已選：' + name + (addr ? ' — ' + addr : '');
  sel.style.display = 'block';
  if (ctx === 'ac' && !document.getElementById('ac-name').value) document.getElementById('ac-name').value = name;
  if (ctx === 'lg' && !document.getElementById('lg-name').value) document.getElementById('lg-name').value = name;
  if (ctx === 'n' && !document.getElementById('n-title').value) document.getElementById('n-title').value = name;
}


// ─── Notes ───────────────────────────────────────────────
G.notes = [];
var editNoteIdx = null, noteCatFilter = 'all', curNoteCat = 'food';
var NOTE_CATS = {
  food: { label: '🍜 吃', bg: '#FAEEDA', color: '#854F0B' },
  shop: { label: '🛍 買', bg: '#EEEDFE', color: '#534AB7' },
  place: { label: '📍 逛', bg: '#E1F5EE', color: '#0F6E56' },
  memo: { label: '📝 備忘', bg: '#E6F1FB', color: '#185FA5' }
};

function filterNotes(cat, el) {
  noteCatFilter = cat;
  document.querySelectorAll('#note-cat-tabs .note-cat-btn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  renderNotes();
}
function setNoteCat(cat, el) {
  curNoteCat = cat;
  document.querySelectorAll('#ncat-food,#ncat-shop,#ncat-place,#ncat-memo').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
}
function renderNotes() {
  var el = document.getElementById('notes-list');
  var notes = G.notes || [];
  if (noteCatFilter !== 'all') notes = notes.filter(n => n.cat === noteCatFilter);
  if (!notes.length) { el.innerHTML = '<div style="text-align:center;padding:28px;font-size:14px;color:var(--text3)">尚無筆記，點下方新增<br>或用 AI 整理貼上！</div>'; return; }
  // group by category
  var order = ['food','shop','place','memo'];
  var groups = {};
  notes.forEach(n => { if (!groups[n.cat]) groups[n.cat] = []; groups[n.cat].push(n); });
  var html = '';
  order.forEach(cat => {
    if (!groups[cat]) return;
    var ci = NOTE_CATS[cat];
    groups[cat].forEach((n, gi) => {
      var realIdx = G.notes.indexOf(n);
      var mapH = n.mapUrl ? `<a class="note-map" href="${n.mapUrl}" onclick="navNote(event,'${n.mapUrl}')"><i class="ti ti-brand-google-maps"></i> 導航</a>` : '';
      html += `<div class="note-card"><div class="note-acts"><button class="icon-btn" onclick="openAddNote(${realIdx})" aria-label="編輯"><i class="ti ti-edit"></i></button></div><div class="note-cat-tag" style="background:${ci.bg};color:${ci.color}">${ci.label}</div><div class="note-title">${n.title}</div>${n.body ? `<div class="note-body">${n.body}</div>` : ''}${mapH}${n.day ? `<div class="note-day-tag"><i class="ti ti-calendar" style="font-size:11px"></i> ${n.day}</div>` : ''}</div>`;
    });
  });
  el.innerHTML = html;
}
function navNote(e, url) { e.preventDefault(); window.open(url, '_blank'); }
function openAddNote(idx) {
  editNoteIdx = idx;
  document.getElementById('note-modal-title').textContent = idx === null ? '新增筆記' : '編輯筆記';
  document.getElementById('note-del-btn').style.display = idx === null ? 'none' : 'block';
  G.selPlace.n = null;
  document.getElementById('n-place-results').style.display = 'none';
  document.getElementById('n-place-sel').style.display = 'none';
  if (idx !== null) {
    var n = G.notes[idx];
    setNoteCat(n.cat, document.getElementById('ncat-' + n.cat));
    document.getElementById('n-title').value = n.title || '';
    document.getElementById('n-body').value = n.body || '';
    document.getElementById('n-day').value = n.day || '';
    if (n.mapUrl) { document.getElementById('n-place-sel').textContent = '已儲存地圖連結'; document.getElementById('n-place-sel').style.display = 'block'; G.selPlace.n = { url: n.mapUrl }; }
  } else {
    setNoteCat('food', document.getElementById('ncat-food'));
    ['n-title','n-body','n-day'].forEach(id => document.getElementById(id).value = '');
  }
  openModal('modal-note');
}
function saveNote() {
  var t = document.getElementById('n-title').value.trim(); if (!t) { toast('請填寫標題'); return; }
  var obj = { cat: curNoteCat, title: t, body: document.getElementById('n-body').value.trim(), day: document.getElementById('n-day').value.trim(), mapUrl: G.selPlace.n ? G.selPlace.n.url : (editNoteIdx !== null ? G.notes[editNoteIdx]?.mapUrl || '' : '') };
  if (!G.notes) G.notes = [];
  if (editNoteIdx === null) G.notes.push(obj); else G.notes[editNoteIdx] = obj;
  scheduleSave(); renderNotes(); closeModal('modal-note');
}
function deleteNote() {
  if (!confirm('確定刪除？')) return;
  G.notes.splice(editNoteIdx, 1);
  scheduleSave(); renderNotes(); closeModal('modal-note');
}

// ─── AI Paste ─────────────────────────────────────────────
var aiParsedNotes = [];
function openAIPaste() {
  document.getElementById('ai-input').value = '';
  document.getElementById('ai-result').style.display = 'none';
  document.getElementById('ai-save-notes-btn').style.display = 'none';
  document.getElementById('ai-parse-btn').textContent = '✦ 整理';
  document.getElementById('ai-parse-btn').disabled = false;
  aiParsedNotes = [];
  openModal('modal-ai');
}
async function runAI() {
  var text = document.getElementById('ai-input').value.trim();
  if (!text) { toast('請先貼上內容'); return; }
  var btn = document.getElementById('ai-parse-btn');
  btn.disabled = true; btn.textContent = '整理中…';
  document.getElementById('ai-result').style.display = 'block';
  document.getElementById('ai-result-content').innerHTML = '<div class="ai-loading"><div class="spinner"></div> AI 分析中，請稍候…</div>';
  document.getElementById('ai-save-notes-btn').style.display = 'none';
  try {
    var res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: `你是旅遊筆記整理助手。請把以下文字整理成結構化筆記，輸出純 JSON 陣列，不要有任何其他文字。

每個筆記格式：
{"cat":"food|shop|place|memo","title":"簡短標題","body":"詳細說明（地址、時間、價格等）","day":"相關日期（若有）"}

cat 分類規則：
- food：餐廳、食物、吃的
- shop：購物、買東西、藥妝、伴手禮
- place：景點、博物館、公園、逛的地方
- memo：其他備忘、注意事項

輸入內容：
${text}`
        }]
      })
    });
    var data = await res.json();
    var raw = data.content?.[0]?.text || '[]';
    // strip markdown
    raw = raw.replace(/```json?/g,'').replace(/```/g,'').trim();
    aiParsedNotes = JSON.parse(raw);
    if (!Array.isArray(aiParsedNotes)) aiParsedNotes = [aiParsedNotes];
    var preview = aiParsedNotes.map((n,i) => {
      var ci = NOTE_CATS[n.cat] || NOTE_CATS.memo;
      return `${i+1}. [${ci.label}] ${n.title}${n.body ? '\n   ' + n.body.substring(0,60) + (n.body.length>60?'…':'') : ''}${n.day ? '\n   📅 '+n.day : ''}`;
    }).join('\n\n');
    document.getElementById('ai-result-content').textContent = preview || '沒有解析到內容';
    document.getElementById('ai-save-notes-btn').style.display = aiParsedNotes.length ? 'block' : 'none';
  } catch(e) {
    document.getElementById('ai-result-content').textContent = '整理失敗：' + e.message + '\n\n請確認 Firebase URL 是否設定，或手動新增筆記。';
  }
  btn.disabled = false; btn.innerHTML = '<i class="ti ti-sparkles"></i> 重新整理';
}
function saveAINotes() {
  if (!aiParsedNotes.length) return;
  if (!G.notes) G.notes = [];
  aiParsedNotes.forEach(n => G.notes.push({ cat: n.cat || 'memo', title: n.title || '未命名', body: n.body || '', day: n.day || '', mapUrl: '' }));
  scheduleSave(); renderNotes(); closeModal('modal-ai');
  toast('已新增 ' + aiParsedNotes.length + ' 則筆記！');
}



// ─── Context Menu (long press) ───────────────────────────
var ctxState = { type: null, dayIdx: null, evIdx: null };
var pressTimer = null;
var pressTarget = null;

function showCtx(x, y, type, dayIdx, evIdx) {
  ctxState = { type, dayIdx, evIdx };
  var menu = document.getElementById('ctx-menu');
  var moveUp = document.getElementById('ctx-move-up');
  var moveDn = document.getElementById('ctx-move-down');
  
  // Show/hide move options based on context
  if (type === 'ev') {
    var evs = G.days[dayIdx].events;
    moveUp.style.display = evIdx > 0 ? 'flex' : 'none';
    moveDn.style.display = evIdx < evs.length - 1 ? 'flex' : 'none';
  } else if (type === 'day') {
    moveUp.style.display = dayIdx > 0 ? 'flex' : 'none';
    moveDn.style.display = dayIdx < G.days.length - 1 ? 'flex' : 'none';
  } else {
    moveUp.style.display = 'none';
    moveDn.style.display = 'none';
  }
  
  // Position menu
  var vw = window.innerWidth, vh = window.innerHeight;
  var mw = 200, mh = 200;
  var mx = Math.min(x, vw - mw - 12);
  var my = Math.min(y, vh - mh - 12);
  if (my < 60) my = 60;
  menu.style.left = mx + 'px';
  menu.style.top = my + 'px';
  menu.style.display = 'block';
  document.getElementById('ctx-backdrop').classList.add('show');
  
  // Haptic feedback
  if (navigator.vibrate) navigator.vibrate(30);
}

function closeCtx() {
  document.getElementById('ctx-menu').style.display = 'none';
  document.getElementById('ctx-backdrop').classList.remove('show');
  // Remove pressing state
  document.querySelectorAll('.pressing').forEach(el => el.classList.remove('pressing'));
}

function ctxEdit() {
  closeCtx();
  if (ctxState.type === 'ev') openAddEvent(ctxState.dayIdx, ctxState.evIdx, null);
  else if (ctxState.type === 'day') openAddDay(ctxState.dayIdx);
  else if (ctxState.type === 'remind') openAddRemind(ctxState.evIdx);
  else if (ctxState.type === 'accom') openAddAccom(ctxState.evIdx);
  else if (ctxState.type === 'note') openAddNote(ctxState.evIdx);
}

function ctxDelete() {
  closeCtx();
  if (!confirm('確定刪除？')) return;
  if (ctxState.type === 'ev') {
    G.days[ctxState.dayIdx].events.splice(ctxState.evIdx, 1);
    scheduleSave(); renderDays();
    setTimeout(() => { var db = document.getElementById('db-' + ctxState.dayIdx); if (db && db.style.display !== 'block') toggleDay(ctxState.dayIdx); }, 60);
  } else if (ctxState.type === 'day') {
    G.days.splice(ctxState.dayIdx, 1);
    scheduleSave(); renderDays();
  } else if (ctxState.type === 'remind') {
    G.reminders.splice(ctxState.evIdx, 1);
    scheduleSave(); renderRemind();
  } else if (ctxState.type === 'accom') {
    G.accom.splice(ctxState.evIdx, 1);
    scheduleSave(); renderAccom();
  } else if (ctxState.type === 'note') {
    G.notes.splice(ctxState.evIdx, 1);
    scheduleSave(); renderNotes();
  }
}

function ctxMove(dir) {
  closeCtx();
  if (ctxState.type === 'ev') {
    var evs = G.days[ctxState.dayIdx].events;
    var i = ctxState.evIdx, j = i + dir;
    if (j < 0 || j >= evs.length) return;
    [evs[i], evs[j]] = [evs[j], evs[i]];
    scheduleSave(); renderDays();
    setTimeout(() => { var db = document.getElementById('db-' + ctxState.dayIdx); if (db && db.style.display !== 'block') toggleDay(ctxState.dayIdx); }, 60);
  } else if (ctxState.type === 'day') {
    var i = ctxState.dayIdx, j = i + dir;
    if (j < 0 || j >= G.days.length) return;
    [G.days[i], G.days[j]] = [G.days[j], G.days[i]];
    scheduleSave(); renderDays();
  }
}

// Attach long press to elements
function attachLongPress(el, type, dayIdx, evIdx) {
  function start(e) {
    var target = e.currentTarget;
    target.classList.add('pressing');
    pressTimer = setTimeout(() => {
      var touch = e.touches ? e.touches[0] : e;
      showCtx(touch.clientX, touch.clientY, type, dayIdx, evIdx);
      target.classList.remove('pressing');
    }, 500);
  }
  function cancel() {
    clearTimeout(pressTimer);
    el.classList.remove('pressing');
  }
  el.addEventListener('touchstart', start, { passive: true });
  el.addEventListener('touchend', cancel);
  el.addEventListener('touchmove', cancel);
  el.addEventListener('touchcancel', cancel);
  // Desktop fallback
  el.addEventListener('contextmenu', function(e) {
    e.preventDefault();
    showCtx(e.clientX, e.clientY, type, dayIdx, evIdx);
  });
}

// Re-attach after render
var _origRenderDays = renderDays;
renderDays = function() {
  _origRenderDays();
  // Attach long press to all ev-wrap and day-hdr
  setTimeout(() => {
    document.querySelectorAll('.ev-wrap[data-day]').forEach(el => {
      attachLongPress(el, 'ev', parseInt(el.dataset.day), parseInt(el.dataset.ev));
    });
    document.querySelectorAll('.daycard').forEach((el, i) => {
      var hdr = el.querySelector('.day-hdr');
      if (hdr) attachLongPress(hdr, 'day', i, null);
    });
  }, 50);
};

var _origRenderRemind = renderRemind;
renderRemind = function() {
  _origRenderRemind();
  setTimeout(() => {
    document.querySelectorAll('.remind-card').forEach((el, i) => {
      // remind cards already have onclick for edit, add long press for delete
      attachLongPress(el, 'remind', null, i);
    });
  }, 50);
};

var _origRenderAccom = renderAccom;
renderAccom = function() {
  _origRenderAccom();
  setTimeout(() => {
    document.querySelectorAll('.accard').forEach((el, i) => {
      attachLongPress(el, 'accom', null, i);
    });
  }, 50);
};

var _origRenderNotes = renderNotes;
renderNotes = function() {
  _origRenderNotes();
  setTimeout(() => {
    document.querySelectorAll('.note-card').forEach((el, i) => {
      attachLongPress(el, 'note', null, i);
    });
  }, 50);
};


// ─── FAB ─────────────────────────────────────────────────
var fabOpen = false;
function toggleFab() {
  fabOpen = !fabOpen;
  document.getElementById('fab-menu').classList.toggle('hidden', !fabOpen);
  document.getElementById('fab-backdrop').classList.toggle('show', fabOpen);
  document.getElementById('fab-icon').className = fabOpen ? 'ti ti-x' : 'ti ti-plus';
  // Show "add event to today" only if itinerary tab is active and days exist
  var evItem = document.getElementById('fab-ev-item');
  if (evItem) evItem.style.display = (G.days && G.days.length && document.getElementById('tp-itinerary').classList.contains('on')) ? 'flex' : 'none';
}
function closeFab() {
  fabOpen = false;
  document.getElementById('fab-menu').classList.add('hidden');
  document.getElementById('fab-backdrop').classList.remove('show');
  document.getElementById('fab-icon').className = 'ti ti-plus';
}
function fabAction(type) {
  closeFab();
  if (type === 'day') { openAddDay(null); }
  else if (type === 'ev') {
    // Open event for first open day, or last day
    var dayIdx = G.days.length - 1;
    // Find the first expanded day
    for (var i = 0; i < G.days.length; i++) {
      var db = document.getElementById('db-' + i);
      if (db && db.style.display === 'block') { dayIdx = i; break; }
    }
    openAddEvent(dayIdx, null, null);
  }
  else if (type === 'remind') { openAddRemind(null); }
  else if (type === 'note') { openAddNote(null); }
  else if (type === 'ai') { openAIPaste(); }
}
// ─── Init ────────────────────────────────────────────────
initRoom().then(() => {
  // Open day 1 by default
  setTimeout(() => {
    var db = document.getElementById('db-0');
    if (db) { db.style.display = 'block'; document.getElementById('chev-0')?.classList.add('open'); }
  }, 300);
});
